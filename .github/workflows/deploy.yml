name: Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore PerfProblemSimulator.slnx

      - name: Build
        run: msbuild src/PerfProblemSimulator/PerfProblemSimulator.csproj /p:Configuration=Release /p:OutputPath=..\..\build\bin

      - name: Prepare deployment package
        shell: pwsh
        run: |
          # Create deployment structure for IIS
          New-Item -ItemType Directory -Path ./deploy/bin -Force
          
          # Copy DLLs to bin folder
          Copy-Item -Path ./build/bin/*.dll -Destination ./deploy/bin/ -Force
          Copy-Item -Path ./build/bin/*.pdb -Destination ./deploy/bin/ -Force -ErrorAction SilentlyContinue
          Copy-Item -Path ./build/bin/*.config -Destination ./deploy/bin/ -Force -ErrorAction SilentlyContinue
          
          # Copy web.config to root
          Copy-Item -Path ./src/PerfProblemSimulator/web.config -Destination ./deploy/ -Force
          
          # Copy Global.asax to root
          Copy-Item -Path ./src/PerfProblemSimulator/Global.asax -Destination ./deploy/ -Force
          
          # Copy NLog.config to root
          Copy-Item -Path ./src/PerfProblemSimulator/NLog.config -Destination ./deploy/ -Force
          
          # Copy wwwroot static files CONTENTS to root (not as subfolder)
          # This allows IIS to serve them directly
          Copy-Item -Path ./src/PerfProblemSimulator/wwwroot/* -Destination ./deploy/ -Recurse -Force
          
          # List deployment contents
          Get-ChildItem -Path ./deploy -Recurse | Select-Object FullName

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Clean stale wwwroot subfolder
        shell: pwsh
        run: |
          # Remove nested wwwroot folder from previous deployment
          az rest --method DELETE --uri "https://perfsimasp48.scm.azurewebsites.net/api/vfs/site/wwwroot/wwwroot/?recursive=true" --resource "https://management.azure.com/" 2>$null
        continue-on-error: true

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: perfsimasp48
          package: ./deploy

      - name: Logout from Azure
        run: az logout
