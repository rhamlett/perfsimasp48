name: Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore dependencies
        run: dotnet restore src/PerfProblemSimulator/PerfProblemSimulator.csproj

      - name: Publish
        run: dotnet publish src/PerfProblemSimulator/PerfProblemSimulator.csproj --configuration Release --output ./publish

      - name: List publish contents
        run: Get-ChildItem -Path ./publish -Recurse | Select-Object FullName

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: perfsimasp48
          package: ./publish

      - name: Logout from Azure
        run: az logout
